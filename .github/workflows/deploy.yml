name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      # 1. Cache & Install Client Dependencies
      - name: Cache Client Dependencies
        id: client-cache
        uses: actions/cache@v3
        with:
          path: Client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('Client/package-lock.json') }}

      - name: Install Client Dependencies
        if: steps.client-cache.outputs.cache-hit != 'true'
        run: |
          cd Client
          npm ci --prefer-offline --no-audit

      # 2. Build Client (Always)
      - name: Build Client
        run: |
          cd Client
          export VITE_API_URL=""
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build

      # 3. Prepare Artifacts
      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy_artifact

          # Copy Server
          echo "📦 Copying Server files..."
          rsync -av --exclude='node_modules' \
                    --exclude='logs' \
                    --exclude='uploads' \
                    --exclude='.env' \
                    --exclude='.git' \
                    --exclude='tmp' \
                    Server deploy_artifact/

          # Copy Scripts
          cp -r scripts deploy_artifact/

          # Always include Client build
          echo "📦 Including Client build..."
          mkdir -p deploy_artifact/Client
          cp -r Client/dist deploy_artifact/Client/
          touch deploy_artifact/.client_updated

          echo "📊 Artifact Size:"
          du -sh deploy_artifact/

          # Compress Artifacts (Huge Speedup for SCP)
          echo "📦 Compressing artifacts..."
          tar -czf deploy_artifact.tar.gz -C deploy_artifact .

      # 4. Transfer Files to EC2 (SCP - Compressed)
      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_artifact.tar.gz"
          target: "/home/ubuntu/"

      # 5. Finalize Deployment
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="/home/ubuntu/Communiatec"
            TEMP_DIR="/home/ubuntu/Communiatec_Temp"
            ARCHIVE="/home/ubuntu/deploy_artifact.tar.gz"

            echo "🚀 Starting Deployment..."

            # Prepare Temp Directory
            rm -rf $TEMP_DIR
            mkdir -p $TEMP_DIR

            # Extract Artifacts
            echo "📦 Extracting artifacts..."
            tar -xzf $ARCHIVE -C $TEMP_DIR
            rm $ARCHIVE

            # Ensure Directories
            mkdir -p $APP_DIR/Client
            mkdir -p $APP_DIR/Server
            mkdir -p $APP_DIR/scripts

            # 1. Update Client (Conditional)
            if [ -f "$TEMP_DIR/.client_updated" ]; then
                echo "📦 Found new Client build, updating..."
                # Ensure target dist exists
                mkdir -p $APP_DIR/Client/dist
                # Sync dist folder
                rsync -av --delete $TEMP_DIR/Client/dist/ $APP_DIR/Client/dist/
            else
                echo "⏩ No new Client build, keeping existing version."
            fi

            # 2. Update Server Code
            echo "📦 Updating Server Code..."
            rsync -av $TEMP_DIR/Server/ $APP_DIR/Server/

            # 3. Update Scripts
            rsync -av $TEMP_DIR/scripts/ $APP_DIR/scripts/
            chmod +x $APP_DIR/scripts/*.sh

            # Cleanup
            rm -rf $TEMP_DIR

            # 4. Server Setup
            cd $APP_DIR/Server

            if [ ! -f ".env" ]; then
                echo "PORT=4000" > .env
                echo "NODE_ENV=production" >> .env
            fi

            # Smart Install: Only if package.json changed
            if [ -f "package.json" ]; then
                # Check if node_modules exists
                if [ ! -d "node_modules" ]; then
                    echo "📦 Installing Server Dependencies (Fresh)..."
                    npm install --production --no-audit --prefer-offline
                else
                    # Simple check: has package.json changed since last run?
                    # For now, we'll just run install, it's fast if cached.
                    # To be super fast, we could use a checksum, but npm install is okay here.
                    echo "📦 Checking Server Dependencies..."
                    npm install --production --no-audit --prefer-offline
                fi
            fi

            # 5. Restart
            echo "🔄 Restarting Server..."
            if command -v pm2 &> /dev/null; then
                pm2 restart communiatec-server --update-env || pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            else
                npm install -g pm2
                pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            fi

            echo "✅ Deployment Complete!"
