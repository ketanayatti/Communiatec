name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 3600s
          command_timeout: 3600s
          script: |
            # 1. Install Dependencies if Node is missing (First time setup)
            if ! command -v node &> /dev/null; then
                echo "Installing Node.js and dependencies..."
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get update
                sudo apt-get install -y nodejs nginx git
                sudo npm install -g pm2
            fi

            # 2. Clone/Update Repo
            APP_DIR="$HOME/Communiatec"
            if [ ! -d "$APP_DIR" ]; then
                echo "Cloning repository..."
                git clone https://github.com/ketanayatti/Communiatec.git $APP_DIR
            else
                echo "Repository already exists, pulling latest changes..."
                cd $APP_DIR
                git reset --hard HEAD
                git fetch origin master
                git reset --hard origin/master
            fi

            # 3. Verify scripts directory exists (with retry)
            cd "$APP_DIR"
            for attempt in 1 2 3; do
                if [ -d "scripts" ]; then
                    echo "scripts directory found on attempt $attempt"
                    break
                fi
                echo "Attempt $attempt: scripts directory not found, checking git status..."
                git status
                git ls-files scripts/
                sleep 1
            done

            # 4. Verify update script exists
            if [ ! -f "scripts/update-app.sh" ]; then
                echo "ERROR: update-app.sh not found"
                echo "Current directory: $(pwd)"
                echo "Directory contents:"
                ls -la
                echo "Scripts directory contents:"
                ls -la scripts/ 2>&1 || echo "Cannot list scripts directory"
                exit 1
            fi

            # 5. Make scripts executable
            chmod +x scripts/update-app.sh scripts/setup-ec2.sh 2>/dev/null || true

            # 6. Run Update Script
            echo "Running update script..."
            bash scripts/update-app.sh
