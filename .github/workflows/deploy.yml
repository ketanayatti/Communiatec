name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Dependencies if Node is missing (First time setup)
            if ! command -v node &> /dev/null; then
                echo "Installing Node.js and dependencies..."
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get update
                sudo apt-get install -y nodejs nginx git
                sudo npm install -g pm2
            fi

            # 2. Clone Repo if missing
            if [ ! -d "$HOME/Communiatec" ]; then
                echo "Cloning repository..."
                git clone https://github.com/ketanayatti/Communiatec.git $HOME/Communiatec
            fi

            # 3. Run Update Script
            chmod +x $HOME/Communiatec/scripts/update-app.sh
            $HOME/Communiatec/scripts/update-app.sh
