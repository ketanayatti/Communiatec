name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Dependencies if Node is missing (First time setup)
            if ! command -v node &> /dev/null; then
                echo "Installing Node.js and dependencies..."
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get update
                sudo apt-get install -y nodejs nginx git
                sudo npm install -g pm2
            fi

            # 2. Clone/Update Repo
            APP_DIR="$HOME/Communiatec"
            if [ ! -d "$APP_DIR" ]; then
                echo "Cloning repository..."
                git clone https://github.com/ketanayatti/Communiatec.git $APP_DIR
            else
                echo "Repository already exists, pulling latest changes..."
                cd $APP_DIR
                git fetch origin
            fi

            # 3. Verify scripts directory exists
            if [ ! -d "$APP_DIR/scripts" ]; then
                echo "ERROR: scripts directory not found in $APP_DIR"
                exit 1
            fi

            # 4. Verify update script exists
            if [ ! -f "$APP_DIR/scripts/update-app.sh" ]; then
                echo "ERROR: update-app.sh not found at $APP_DIR/scripts/update-app.sh"
                ls -la "$APP_DIR/scripts/" || echo "scripts directory listing failed"
                exit 1
            fi

            # 5. Run Update Script
            echo "Running update script..."
            bash "$APP_DIR/scripts/update-app.sh"
