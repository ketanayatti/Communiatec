name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      # 1. Build Client Locally (Much Faster than EC2)
      - name: Install Client Dependencies
        run: |
          cd Client
          npm ci --prefer-offline --no-audit

      - name: Build Client
        run: |
          cd Client
          # Empty API URL allows relative paths (handled by Nginx proxy)
          export VITE_API_URL=""
          # Increase memory for build
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build

      # 2. Prepare Artifacts for Transfer
      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy_artifact

          # Copy Server (Code only, no node_modules)
          cp -r Server deploy_artifact/

          # Copy Scripts
          cp -r scripts deploy_artifact/

          # Copy Client Build (Only dist needed)
          mkdir -p deploy_artifact/Client
          cp -r Client/dist deploy_artifact/Client/

          # Cleanup any accidental node_modules in artifacts
          rm -rf deploy_artifact/Server/node_modules
          rm -rf deploy_artifact/Client/node_modules

      # 3. Transfer Files to EC2 (SCP)
      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_artifact/*"
          target: "/home/ubuntu/Communiatec_Temp"
          strip_components: 1

      # 4. Finalize Deployment on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="/home/ubuntu/Communiatec"
            TEMP_DIR="/home/ubuntu/Communiatec_Temp"

            echo "🚀 Starting Deployment..."

            # Ensure App Directory Exists
            mkdir -p $APP_DIR/Client
            mkdir -p $APP_DIR/Server
            mkdir -p $APP_DIR/scripts

            # Sync Files (rsync is safer/faster for updates)
            # Update Client Build
            echo "📦 Updating Client Build..."
            rsync -av --delete $TEMP_DIR/Client/dist/ $APP_DIR/Client/dist/

            # Update Server Code
            echo "📦 Updating Server Code..."
            rsync -av $TEMP_DIR/Server/ $APP_DIR/Server/

            # Update Scripts
            rsync -av $TEMP_DIR/scripts/ $APP_DIR/scripts/
            chmod +x $APP_DIR/scripts/*.sh

            # Cleanup Temp
            rm -rf $TEMP_DIR

            # Server Setup
            cd $APP_DIR/Server

            # Ensure .env exists
            if [ ! -f ".env" ]; then
                echo "⚠️ Creating default .env..."
                echo "PORT=4000" > .env
                echo "NODE_ENV=production" >> .env
            fi

            # Install Server Dependencies (Only if package.json changed)
            echo "📦 Installing Server Dependencies..."
            npm install --production --no-audit --prefer-offline

            # Restart Application
            echo "🔄 Restarting Server..."
            if command -v pm2 &> /dev/null; then
                pm2 restart communiatec-server --update-env || pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            else
                npm install -g pm2
                pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            fi

            echo "✅ Deployment Complete!"
