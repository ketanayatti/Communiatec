name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

env:
  APP_DIR: "/home/ubuntu/Communiatec"
  TEMP_DIR: "/home/ubuntu/Communiatec_Temp"
  NODE_VERSION: "20"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ============ CHECKOUT & SETUP ============
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ============ DETECT & FIX DEPENDENCY ISSUES ============
      - name: Detect Duplicate Dependencies
        working-directory: Client
        run: |
          echo "🔍 Scanning for duplicate dependencies..."

          # Create a script to find duplicate packages
          node -e "
          const fs = require('fs');
          const path = require('path');

          const getVersion = (dir) => {
            try {
              const pkg = JSON.parse(fs.readFileSync(path.join(dir, 'package.json'), 'utf8'));
              return pkg.version;
            } catch { return null; }
          };

          const findDuplicates = (dir, duplicates = {}) => {
            if (!fs.existsSync(dir)) return duplicates;
            
            const entries = fs.readdirSync(dir);
            for (const entry of entries) {
              const fullPath = path.join(dir, entry);
              try {
                if (fs.statSync(fullPath).isDirectory()) {
                  const pkgPath = path.join(fullPath, 'package.json');
                  if (fs.existsSync(pkgPath)) {
                    const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                    if (!duplicates[pkg.name]) duplicates[pkg.name] = [];
                    duplicates[pkg.name].push({ version: pkg.version, path: fullPath });
                  }
                  findDuplicates(fullPath, duplicates);
                }
              } catch (e) {}
            }
            return duplicates;
          };

          const dups = findDuplicates('node_modules');
          let hasDuplicates = false;
          for (const [pkg, versions] of Object.entries(dups)) {
            if (versions.length > 1) {
              console.log('⚠️ Duplicate:', pkg, versions.map(v => v.version).join(', '));
              hasDuplicates = true;
            }
          }
          process.exit(hasDuplicates ? 1 : 0);
          " || echo "⚠️ Duplicates detected, will rebuild fresh"

      - name: Clean and Rebuild Client Dependencies
        working-directory: Client
        run: |
          echo "🧹 Cleaning previous installations..."
          rm -rf node_modules package-lock.json npm-shrinkwrap.json .npmrc

          echo "🔧 Configuring npm..."
          npm config set legacy-peer-deps=true --legacy-peer-deps
          npm config set fetch-timeout=60000
          npm config set fetch-retry-mintimeout=20000
          npm config set fetch-retry-maxtimeout=120000

          echo "📦 Installing dependencies..."
          npm install --prefer-offline --no-audit --legacy-peer-deps

          if [ ! -f "package-lock.json" ]; then
            echo "❌ package-lock.json not created"
            exit 1
          fi

          echo "✅ Dependencies installed successfully"

      - name: Validate & Fix Missing Dependencies
        working-directory: Client
        run: |
          echo "🔍 Checking for missing dependencies..."

          # Get list of imports from source files
          MISSING_DEPS=()

          # Check for commonly problematic packages
          CRITICAL_PACKAGES=("monaco-editor" "three" "@monaco-editor/react")

          for pkg in "${CRITICAL_PACKAGES[@]}"; do
            if grep -r "from ['\"]$pkg['\"]" src/ 2>/dev/null | grep -q .; then
              if ! npm list "$pkg" 2>/dev/null | grep -q "$pkg@"; then
                echo "⚠️ Missing: $pkg"
                MISSING_DEPS+=("$pkg")
              fi
            fi
          done

          # Install missing dependencies if any
          if [ ${#MISSING_DEPS[@]} -gt 0 ]; then
            echo "📦 Installing missing dependencies: ${MISSING_DEPS[*]}"
            npm install "${MISSING_DEPS[@]}" --legacy-peer-deps
          fi

          echo "✅ Dependency check complete"

      # ============ CLIENT BUILD ============
      - name: Build Client
        working-directory: Client
        run: |
          export VITE_API_URL=""
          export NODE_OPTIONS="${{ env.NODE_OPTIONS }}"

          echo "🏗️ Building client application..."

          # First attempt
          if npm run build; then
            echo "✅ Build succeeded on first attempt"
          else
            echo "⚠️ Build failed, attempting recovery..."
            
            # Clear vite cache
            echo "🧹 Clearing cache..."
            rm -rf .vite node_modules/.vite
            
            # Try installing all optional dependencies
            echo "📦 Installing optional dependencies..."
            npm install --save-optional --legacy-peer-deps 2>&1 | tail -5 || true
            
            # Retry build
            echo "🔁 Retrying build..."
            if npm run build; then
              echo "✅ Build succeeded after recovery"
            else
              echo "❌ Build failed after recovery"
              exit 1
            fi
          fi

          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ Build failed: dist folder is empty"
            exit 1
          fi

          echo "✅ Client build successful: $(du -sh dist | cut -f1)"

      # ============ SERVER VALIDATION ============
      - name: Validate Server
        working-directory: Server
        run: |
          echo "🔍 Validating server configuration..."

          if [ ! -f "package.json" ]; then
            echo "❌ Server/package.json not found"
            exit 1
          fi

          ENTRY_POINT=""
          if [ -f "server.js" ]; then
            ENTRY_POINT="server.js"
          elif [ -f "index.js" ]; then
            ENTRY_POINT="index.js"
          elif [ -f "app.js" ]; then
            ENTRY_POINT="app.js"
          fi

          if [ -z "$ENTRY_POINT" ]; then
            echo "❌ No entry point found (server.js, index.js, or app.js)"
            exit 1
          fi

          echo "✅ Entry point found: $ENTRY_POINT"

      # ============ PREPARE ARTIFACTS ============
      - name: Prepare Deployment Artifacts
        run: |
          set -e
          echo "📦 Preparing deployment artifacts..."

          mkdir -p deploy_artifact/{Client,Server,scripts}

          # Copy Server
          echo "📋 Copying Server..."
          rsync -av --delete \
            --exclude='node_modules' \
            --exclude='logs' \
            --exclude='uploads' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='tmp' \
            --exclude='dist' \
            --exclude='coverage' \
            Server/ deploy_artifact/Server/

          # Copy Scripts
          if [ -d "scripts" ]; then
            echo "📋 Copying scripts..."
            rsync -av scripts/ deploy_artifact/scripts/
            chmod +x deploy_artifact/scripts/*.sh 2>/dev/null || true
          fi

          # Copy Client build
          echo "📋 Copying Client build..."
          rsync -av --delete Client/dist/ deploy_artifact/Client/dist/
          touch deploy_artifact/.client_updated

          # Create manifest
          echo "✅ Build: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > deploy_artifact/MANIFEST.txt
          echo "Commit: $(git rev-parse --short HEAD)" >> deploy_artifact/MANIFEST.txt

          echo "📊 Artifact size: $(du -sh deploy_artifact | cut -f1)"

      - name: Compress Artifacts
        run: |
          echo "📦 Compressing artifacts..."
          tar -czf deploy_artifact.tar.gz -C deploy_artifact .

          SIZE=$(ls -lh deploy_artifact.tar.gz | awk '{print $5}')
          echo "✅ Compressed size: $SIZE"

          # Verify integrity
          tar -tzf deploy_artifact.tar.gz > /dev/null
          echo "✅ Archive integrity verified"

      # ============ TRANSFER TO EC2 ============
      - name: Transfer Artifact to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_artifact.tar.gz"
          target: "/home/ubuntu/"
          timeout: "300s"

      # ============ DEPLOY ON EC2 ============
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: "30m"
          script: |
            set -e

            ARCHIVE="/home/ubuntu/deploy_artifact.tar.gz"

            echo "🚀 Starting deployment..."

            # Cleanup
            echo "🧹 Cleaning up..."
            rm -rf "${{ env.TEMP_DIR }}"
            mkdir -p "${{ env.TEMP_DIR }}"

            # Extract
            echo "📦 Extracting artifacts..."
            tar -xzf "$ARCHIVE" -C "${{ env.TEMP_DIR }}"
            rm "$ARCHIVE"

            # Ensure directories
            mkdir -p "${{ env.APP_DIR }}/Client/dist"
            mkdir -p "${{ env.APP_DIR }}/Server"
            mkdir -p "${{ env.APP_DIR }}/scripts"

            # Update Client
            if [ -f "${{ env.TEMP_DIR }}/.client_updated" ]; then
              echo "📋 Updating client build..."
              rsync -av --delete "${{ env.TEMP_DIR }}/Client/dist/" "${{ env.APP_DIR }}/Client/dist/"
              echo "✅ Client updated"
            fi

            # Update Server Code
            echo "📋 Updating server code..."
            rsync -av "${{ env.TEMP_DIR }}/Server/" "${{ env.APP_DIR }}/Server/"

            # Update Scripts
            if [ -d "${{ env.TEMP_DIR }}/scripts" ]; then
              rsync -av "${{ env.TEMP_DIR }}/scripts/" "${{ env.APP_DIR }}/scripts/"
              chmod +x "${{ env.APP_DIR }}/scripts/"*.sh 2>/dev/null || true
            fi

            # Cleanup temp
            rm -rf "${{ env.TEMP_DIR }}"

            # Setup Server
            cd "${{ env.APP_DIR }}/Server"

            echo "🔧 Configuring server..."
            if [ ! -f ".env" ]; then
              echo "PORT=4000" > .env
              echo "NODE_ENV=production" >> .env
            fi

            # Install/Update Dependencies
            echo "📦 Installing server dependencies..."
            npm config set legacy-peer-deps=true --legacy-peer-deps
            npm install --production --no-audit --prefer-offline --legacy-peer-deps 2>&1 | grep -E "(added|up to date)" || true

            if [ ! -d "node_modules" ]; then
              echo "❌ Server dependencies installation failed"
              exit 1
            fi

            # Start Server
            echo "🔄 Starting server..."
            if command -v pm2 &> /dev/null; then
              pm2 restart communiatec-server --update-env 2>/dev/null || pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            else
              npm install -g pm2
              pm2 start server.js --name "communiatec-server" --env NODE_ENV=production
            fi

            # Verify Server is Running
            sleep 3
            if pm2 list | grep -q "communiatec-server.*online"; then
              echo "✅ Server is running"
            else
              echo "⚠️ Server may not be running, checking logs..."
              pm2 logs communiatec-server --lines 20
            fi

            # Restart Nginx
            echo "🔄 Restarting nginx..."
            sudo systemctl restart nginx || sudo service nginx restart

            echo "✅ Deployment complete!"

      - name: Deployment Status
        if: always()
        run: |
          echo "🎉 Workflow completed"
